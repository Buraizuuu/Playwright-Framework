<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Main background gradient — deep navy to slate -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0a0e1a"/>
      <stop offset="50%"  stop-color="#0f1623"/>
      <stop offset="100%" stop-color="#131d2e"/>
    </linearGradient>

    <!-- Green accent gradient (Playwright) -->
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#2ea043"/>
      <stop offset="50%"  stop-color="#45ba4b"/>
      <stop offset="100%" stop-color="#2ea043"/>
    </linearGradient>

    <!-- Blue accent gradient (API) -->
    <linearGradient id="blueGrad" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#388bfd"/>
    </linearGradient>

    <!-- Title glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e2d40" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- ── Background ──────────────────────────────────────────────── -->
  <rect width="1280" height="320" fill="url(#bgGrad)"/>
  <rect width="1280" height="320" fill="url(#grid)" opacity="0.6"/>

  <!-- ── Glow orbs (depth layer) ────────────────────────────────── -->
  <ellipse cx="180"  cy="160" rx="200" ry="160" fill="#45ba4b" opacity="0.04"/>
  <ellipse cx="1100" cy="160" rx="200" ry="160" fill="#388bfd" opacity="0.04"/>
  <ellipse cx="640"  cy="320" rx="400" ry="180" fill="#1f6feb" opacity="0.04"/>

  <!-- ── Top accent bar ─────────────────────────────────────────── -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#greenGrad)"/>

  <!-- ── Left bracket decoration ───────────────────────────────── -->
  <rect x="72"  y="72"  width="3" height="176" fill="#45ba4b" opacity="0.5" rx="1"/>
  <rect x="72"  y="72"  width="24" height="3"  fill="#45ba4b" opacity="0.5" rx="1"/>
  <rect x="72"  y="245" width="24" height="3"  fill="#45ba4b" opacity="0.5" rx="1"/>

  <!-- ── Right bracket decoration ──────────────────────────────── -->
  <rect x="1205" y="72"  width="3" height="176" fill="#388bfd" opacity="0.5" rx="1"/>
  <rect x="1184" y="72"  width="24" height="3"  fill="#388bfd" opacity="0.5" rx="1"/>
  <rect x="1184" y="245" width="24" height="3"  fill="#388bfd" opacity="0.5" rx="1"/>

  <!-- ── Horizontal separator lines ────────────────────────────── -->
  <line x1="120" y1="218" x2="500" y2="218" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="780" y1="218" x2="1160" y2="218" stroke="#1e3a5f" stroke-width="1"/>

  <!-- ── UI badge ───────────────────────────────────────────────── -->
  <rect x="510" y="205" width="82" height="26" rx="5" fill="#45ba4b" opacity="0.12"/>
  <rect x="510" y="205" width="82" height="26" rx="5" fill="none" stroke="#45ba4b" stroke-width="1" opacity="0.4"/>
  <text
    x="551" y="223"
    font-family="'Courier New', Courier, monospace"
    font-size="11"
    font-weight="700"
    fill="#45ba4b"
    text-anchor="middle"
    letter-spacing="2"
    opacity="0.9"
  >UI</text>

  <!-- ── Centre dot ─────────────────────────────────────────────── -->
  <circle cx="640" cy="218" r="3" fill="#2a3f5f"/>
  <circle cx="640" cy="218" r="1.5" fill="#45ba4b" opacity="0.6"/>

  <!-- ── API badge ──────────────────────────────────────────────── -->
  <rect x="688" y="205" width="82" height="26" rx="5" fill="#1f6feb" opacity="0.12"/>
  <rect x="688" y="205" width="82" height="26" rx="5" fill="none" stroke="#388bfd" stroke-width="1" opacity="0.4"/>
  <text
    x="729" y="223"
    font-family="'Courier New', Courier, monospace"
    font-size="11"
    font-weight="700"
    fill="#388bfd"
    text-anchor="middle"
    letter-spacing="2"
    opacity="0.9"
  >API</text>

  <!-- ── Main title ─────────────────────────────────────────────── -->
  <text
    x="640" y="152"
    font-family="'Courier New', Courier, monospace"
    font-size="88"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    letter-spacing="10"
    filter="url(#glow)"
  >PLAYWRIGHT</text>

  <!-- ── Subtitle ───────────────────────────────────────────────── -->
  <text
    x="640" y="196"
    font-family="'Courier New', Courier, monospace"
    font-size="20"
    font-weight="600"
    fill="#45ba4b"
    text-anchor="middle"
    letter-spacing="8"
  >AUTOMATION FRAMEWORK</text>

  <!-- ── Tech tagline ───────────────────────────────────────────── -->
  <text
    x="640" y="272"
    font-family="'Courier New', Courier, monospace"
    font-size="13"
    fill="#4a6080"
    text-anchor="middle"
    letter-spacing="3"
  >TypeScript  ·  Page Object Model  ·  API Testing  ·  Winston  ·  Faker.js</text>

  <!-- ── Bottom accent bar ──────────────────────────────────────── -->
  <rect x="0" y="317" width="1280" height="3" fill="url(#greenGrad)"/>

</svg>
